# bert_001v2: bert-base-uncased on expanded dataset (203 paragraphs)
experiment_id: bert_001v2
description: "BERT-base fine-tuned on LLM annotations v2 (NER, 203 paragraphs). General-domain baseline."

model_name: bert-base-uncased
task: ner

train:  data/training/ner_v2/train.jsonl
val:    data/training/ner_v2/val.jsonl
labels: data/training/ner_v2/labels.json
output_dir: models/bert_001v2

epochs:        10
batch_size:    8
max_length:    512
learning_rate: 2.0e-5
warmup_ratio:  0.1
weight_decay:  0.01
seed:          42
