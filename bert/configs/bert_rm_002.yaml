# bert_rm_002: SciBERT distilled from ReactionMiner (LLaMA-2-7b + LoRA)
# Labels: PRODUCT, REACTANT, CATALYST, SOLVENT, TEMP, TIME, YIELD, COND
experiment_id: bert_rm_002
description: "SciBERT distilled from ReactionMiner LLaMA-2-7b+LoRA annotations. Domain-pretrained comparison."

model_name: allenai/scibert_scivocab_cased
task: ner

train:  data/training/rm_ner_v2/train.jsonl
val:    data/training/rm_ner_v2/val.jsonl
labels: data/training/rm_ner_v2/labels.json
output_dir: models/bert_rm_002_v2

epochs:        10
batch_size:    8
max_length:    512
learning_rate: 2.0e-5
warmup_ratio:  0.1
weight_decay:  0.01
seed:          42
