# bert_rm_001: bert-base-uncased distilled from ReactionMiner (LLaMA-2-7b + LoRA)
# Labels: PRODUCT, REACTANT, CATALYST, SOLVENT, TEMP, TIME, YIELD, COND
experiment_id: bert_rm_001
description: "BERT-base distilled from ReactionMiner LLaMA-2-7b+LoRA annotations. Baseline speed comparison."

model_name: bert-base-uncased
task: ner

train:  data/training/rm_ner_v2/train.jsonl
val:    data/training/rm_ner_v2/val.jsonl
labels: data/training/rm_ner_v2/labels.json
output_dir: models/bert_rm_001_v2

epochs:        10
batch_size:    16
max_length:    512
learning_rate: 2.0e-5
warmup_ratio:  0.1
weight_decay:  0.01
seed:          42
