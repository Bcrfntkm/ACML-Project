# bert_001: bert-base-uncased — нижняя граница (general domain)
experiment_id: bert_001
description: "BERT-base fine-tuned on LLM annotations (NER task). General-domain baseline."

model_name: bert-base-uncased
task: ner

train:  data/training/ner/train.jsonl
val:    data/training/ner/val.jsonl
labels: data/training/ner/labels.json
output_dir: models/bert_001

epochs:        3
batch_size:    16
max_length:    512
learning_rate: 2.0e-5
warmup_ratio:  0.1
weight_decay:  0.01
seed:          42
