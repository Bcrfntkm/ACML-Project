# bert_002v2: SciBERT on expanded dataset (203 paragraphs)
experiment_id: bert_002v2
description: "SciBERT fine-tuned on LLM annotations v2 (NER, 203 paragraphs). Domain-pretrained model."

model_name: allenai/scibert_scivocab_cased
task: ner

train:  data/training/ner_v2/train.jsonl
val:    data/training/ner_v2/val.jsonl
labels: data/training/ner_v2/labels.json
output_dir: models/bert_002v2

epochs:        10
batch_size:    8
max_length:    512
learning_rate: 2.0e-5
warmup_ratio:  0.1
weight_decay:  0.01
seed:          42
